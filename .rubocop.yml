AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  Exclude:
    - 'test/**/*'
    - 'vendor/**/*'
    - 'output/**/*'

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/AbcSize:
  Max: 25

Layout/LineLength:
  Max: 120

Style/FrozenStringLiteralComment:
  Enabled: true